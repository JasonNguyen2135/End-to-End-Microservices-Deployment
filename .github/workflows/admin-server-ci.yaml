name: Admin Server CI

on:
  push:
    branches: [ "main", "dev" ]
    paths:
      - 'spring-boot-app/admin-server/**'
      - '.github/workflows/admin-server-ci.yaml'

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
      DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
      DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
      SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_URL }}

    defaults:
      run:
        working-directory: spring-boot-app/admin-server

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Cache SonarQube packages
        uses: actions/cache@v4
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      - name: Build
        run: mvn clean verify -DskipTests

      - name: SonarQube Scan
        if: env.SONAR_TOKEN != '' && env.SONAR_HOST_URL != ''
        run: mvn org.sonarsource.scanner.maven:sonar-maven-plugin:sonar -Dsonar.projectKey=spring-boot-app-admin-server

      - name: Login Docker Hub
        if: env.DOCKER_USERNAME != '' && env.DOCKER_PASSWORD != ''
        uses: docker/login-action@v2
        with:
          username: ${{ env.DOCKER_USERNAME }}
          password: ${{ env.DOCKER_PASSWORD }}

      - name: Build Docker image
        if: env.DOCKER_USERNAME != '' && env.DOCKER_PASSWORD != ''
        run: docker build -f Dockerfile -t ${{ env.DOCKER_USERNAME }}/admin-server:${{ github.ref_name }} -t ${{ env.DOCKER_USERNAME }}/admin-server:${{ github.ref_name }}-${{ github.sha }} ..

      - name: Run Trivy vulnerability scanner
        if: env.DOCKER_USERNAME != '' && env.DOCKER_PASSWORD != ''
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ env.DOCKER_USERNAME }}/admin-server:${{ github.ref_name }}-${{ github.sha }}'
          format: 'table'
          exit-code: '0'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

      - name: Push Docker image
        if: env.DOCKER_USERNAME != '' && env.DOCKER_PASSWORD != ''
        run: |
          docker push ${{ env.DOCKER_USERNAME }}/admin-server:${{ github.ref_name }}
          docker push ${{ env.DOCKER_USERNAME }}/admin-server:${{ github.ref_name }}-${{ github.sha }}

      - name: Slack Notification - Success
        if: success() && env.SLACK_WEBHOOK != ''
        uses: rtCamp/action-slack-notify@v2
        env:
          SLACK_WEBHOOK: ${{ env.SLACK_WEBHOOK }}
          SLACK_COLOR: 'good'
          SLACK_TITLE: 'Build Success'
          SLACK_MESSAGE: 'Service: ${{ github.workflow }} has been built, scanned, and pushed successfully! 🚀'

      - name: Slack Notification - Failure
        if: failure() && env.SLACK_WEBHOOK != ''
        uses: rtCamp/action-slack-notify@v2
        env:
          SLACK_WEBHOOK: ${{ env.SLACK_WEBHOOK }}
          SLACK_COLOR: 'danger'
          SLACK_TITLE: 'Build Failed'
          SLACK_MESSAGE: 'Something went wrong in the CI pipeline for ${{ github.workflow }}. Please check the logs! ❌'
