# EXAMPLE only — do NOT commit a real Slack token.
# Apply the real secret manually:
#
#   kubectl -n argocd create secret generic argocd-notifications-secret \
#     --from-literal=slack-token=xoxb-your-bot-token-here
#
# Or copy this file to argocd/notifications-secret.yaml (gitignored), fill in
# the token, then `kubectl apply -f argocd/notifications-secret.yaml`.

apiVersion: v1
kind: Secret
metadata:
  name: argocd-notifications-secret
  namespace: argocd
type: Opaque
stringData:
  slack-token: xoxb-REPLACE-WITH-YOUR-BOT-TOKEN
