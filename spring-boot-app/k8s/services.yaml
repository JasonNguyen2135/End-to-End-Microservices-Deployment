apiVersion: v1
kind: Service
metadata:
  name: notification-service
  namespace: spring-microservices
spec:
  ports:
    - port: 8080
  selector:
    app: notification-service
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-service
  namespace: spring-microservices
spec:
  selector:
    matchLabels:
      app: notification-service
  template:
    metadata:
      labels:
        app: notification-service
    spec:
      containers:
        - name: notification-service
          image: hiunehihi/notification-service:main
          imagePullPolicy: Always
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: docker
            - name: EUREKA_CLIENT_SERVICEURL_DEFAULTZONE
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: eureka-default-zone
            - name: EUREKA_INSTANCE_HOSTNAME
              value: notification-service
            - name: SPRING_KAFKA_BOOTSTRAP_SERVERS
              value: broker:29092
          # Notification-service is a pure Kafka consumer (no HTTP server),
          # so we use exec probe checking the JVM process is alive (PID 1).
          readinessProbe:
            exec:
              command: ["sh", "-c", "kill -0 1"]
            initialDelaySeconds: 60
            periodSeconds: 30
          livenessProbe:
            exec:
              command: ["sh", "-c", "kill -0 1"]
            initialDelaySeconds: 180
            periodSeconds: 60
            failureThreshold: 5
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
