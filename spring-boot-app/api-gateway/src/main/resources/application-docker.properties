server.port=8080
eureka.client.serviceUrl.defaultZone=http://eureka:password@discovery-server:8761/eureka/
spring.security.oauth2.resourceserver.jwt.issuer-uri=http://keycloak:8080/auth/realms/spring-boot-ms-realm
management.zipkin.tracing.endpoint=http://zipkin:9411/api/v2/spans
app.eureka-server=discovery-server

# Keycloak realm + clients (Phase 3 register/login proxy + admin user mgmt)
keycloak.base-url=http://keycloak:8080/auth
keycloak.realm=spring-boot-ms-realm
keycloak.frontend-client-id=spring-cloud-client
keycloak.registration-client-id=registration-svc
keycloak.registration-client-secret=registration-svc-secret