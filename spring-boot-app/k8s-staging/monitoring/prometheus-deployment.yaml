apiVersion: v1
kind: ServiceAccount
metadata:
  name: prometheus-staging
  namespace: monitoring-staging
  labels:
    app: prometheus-staging
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: prometheus-staging
  namespace: monitoring-staging
  labels:
    app: prometheus-staging
rules:
  - apiGroups: [""]
    resources:
      - services
      - endpoints
      - pods
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: prometheus-staging
  namespace: monitoring-staging
  labels:
    app: prometheus-staging
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: prometheus-staging
subjects:
  - kind: ServiceAccount
    name: prometheus-staging
    namespace: monitoring-staging
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus-staging-server
  namespace: monitoring-staging
  labels:
    app: prometheus-staging
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus-staging
      component: server
  template:
    metadata:
      labels:
        app: prometheus-staging
        component: server
      annotations:
        prometheus.io/scrape: "false"
    spec:
      serviceAccountName: prometheus-staging
      containers:
        - name: prometheus
          image: prom/prometheus:v2.45.0
          args:
            - '--storage.tsdb.retention.time=7d'
            - '--storage.tsdb.path=/data'
            - '--config.file=/etc/prometheus/prometheus.yml'
          ports:
            - containerPort: 9090
              name: http
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          volumeMounts:
            - name: config
              mountPath: /etc/prometheus
            - name: storage
              mountPath: /data
      volumes:
        - name: config
          configMap:
            name: prometheus-config
        - name: storage
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus-staging-server
  namespace: monitoring-staging
  labels:
    app: prometheus-staging
spec:
  type: ClusterIP
  ports:
    - port: 9090
      targetPort: 9090
      name: http
  selector:
    app: prometheus-staging
    component: server
