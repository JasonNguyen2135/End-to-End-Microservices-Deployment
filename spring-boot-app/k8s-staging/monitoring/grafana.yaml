apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana-staging
  namespace: monitoring-staging
  labels:
    app: grafana-staging
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana-staging
  template:
    metadata:
      labels:
        app: grafana-staging
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "3000"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: grafana
          image: grafana/grafana:10.0.0
          ports:
            - containerPort: 3000
              name: http
          env:
            - name: GF_SECURITY_ADMIN_USER
              value: "admin"
            - name: GF_SECURITY_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: grafana-staging-credentials
                  key: admin-password
                  optional: true
            - name: GF_SERVER_ROOT_URL
              value: "http://staging-grafana.ecommerce-demo.com"
            - name: GF_SERVER_DOMAIN
              value: "staging-grafana.ecommerce-demo.com"
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
          volumeMounts:
            - name: grafana-storage
              mountPath: /var/lib/grafana
            - name: grafana-datasources
              mountPath: /etc/grafana/provisioning/datasources
              readOnly: false
      volumes:
        - name: grafana-storage
          emptyDir: {}
        - name: grafana-datasources
          configMap:
            name: grafana-staging-datasources
---
apiVersion: v1
kind: Service
metadata:
  name: grafana-staging
  namespace: monitoring-staging
  labels:
    app: grafana-staging
spec:
  type: ClusterIP
  ports:
    - port: 3000
      targetPort: 3000
      name: http
  selector:
    app: grafana-staging
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-staging-datasources
  namespace: monitoring-staging
  labels:
    app: grafana-staging
data:
  datasources.yaml: |
    apiVersion: 1
    datasources:
      - name: Prometheus-Staging
        type: prometheus
        access: proxy
        url: http://prometheus-staging-server.monitoring-staging.svc.cluster.local:9090
        isDefault: true
        editable: false
        jsonData:
          timeInterval: "15s"
---
apiVersion: v1
kind: Secret
metadata:
  name: grafana-staging-credentials
  namespace: monitoring-staging
type: Opaque
stringData:
  admin-password: "staging123"
